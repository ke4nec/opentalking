name: CI

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install System Packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Dependencies
        run: |
          python -m pip install -U pip setuptools wheel
          pip install -e ".[dev]"

      - name: Lint
        run: >
          ruff check
          opentalking/core
          opentalking/events
          opentalking/avatar
          apps/api
          apps/unified
          apps/cli
          tests

      - name: Type Check
        run: >
          mypy
          opentalking/core
          opentalking/events
          opentalking/avatar
          apps/api
          apps/unified
          apps/cli
          --ignore-missing-imports

      - name: Test
        run: pytest apps/api/tests tests

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install
        run: npm ci

      - name: Type Check
        run: npm run typecheck

      - name: Build
        run: npm run build

  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: |
          python -m pip install -U pip setuptools wheel
          pip install -e ".[dev]"
          pip install -r docs/requirements.txt

      - name: Build Docs
        run: python -m mkdocs build --strict --clean
