name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: datascale-ai
  RELEASE_VERSION: ${{ inputs.version || github.ref_name }}

jobs:
  python-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Build package artifacts
        run: |
          python -m pip install -U pip setuptools wheel build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: opentalking-python-dist
          path: dist/*

  docker-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: docker/Dockerfile.api
            image: opentalking-api
          - service: worker
            dockerfile: docker/Dockerfile.worker
            image: opentalking-worker
          - service: web
            dockerfile: docker/Dockerfile.web
            image: opentalking-web
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ env.RELEASE_VERSION }}
          labels: |
            org.opencontainers.image.source=https://github.com/datascale-ai/opentalking
            org.opencontainers.image.version=${{ env.RELEASE_VERSION }}
            org.opencontainers.image.revision=${{ github.sha }}

  github-release:
    runs-on: ubuntu-latest
    needs:
      - python-artifacts
      - docker-images
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: opentalking-python-dist
          path: dist
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: OpenTalking ${{ env.RELEASE_VERSION }}
          body_path: .github/releases/v0.1.0.md
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
